version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-cnpm-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: library_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_SSL: "false"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: project-cnpm-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
